kind = "mobile"
previewPath = "/"
title = "Converso CRM"
version = "1.0.0"
id = "artifacts/converso"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23523

[services.development]
run = "pnpm --filter @workspace/converso run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/converso", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/converso", "run", "serve" ]

[services.env]
PORT = "23523"
BASE_PATH = "/"
